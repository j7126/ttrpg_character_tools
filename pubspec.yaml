name: ttrpg_character_tools
description: "A simple ttrpg character manager."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.10.7'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  dynamic_color: ^1.7.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.3
  uuid: ^4.5.2
  gap: ^3.0.1
  json_annotation: ^4.9.0
  collection: ^1.18.0
  xxh3: ^1.2.0
  protobuf: ^6.0.0
  path: ^1.9.1
  render_ttrpg_data:
    git:
      url: https://github.com/j7126/render_ttrpg_data
      ref: de6085e7211b4f3e20895211d4ffc6f24c3d3927
  crypto: ^3.0.7
  file_picker: ^10.3.10
  macos_secure_bookmarks: ^0.2.1
  window_manager: ^0.5.1
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - data/class/
    - data/
